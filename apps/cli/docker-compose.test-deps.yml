services:
  dynamodb:
    container_name: celerity_test_dynamodb
    image: amazon/dynamodb-local:3.3.0
    ports:
      - "48000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8000 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s

  minio:
    container_name: celerity_test_minio
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data
    ports:
      - "49000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  postgres:
    container_name: celerity_test_postgres
    image: postgres:17-alpine
    ports:
      - "45433:5432"
    environment:
      POSTGRES_DB: celerity_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  valkey:
    container_name: celerity_test_valkey
    image: valkey/valkey:8-alpine
    ports:
      - "46379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 5s
