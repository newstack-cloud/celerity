services:
  valkey:
    container_name: "valkey_local_events_tests"
    image: valkey/valkey:8-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s
    environment:
      - ALLOW_EMPTY_PASSWORD=yes

  dynamodb-local:
    container_name: "dynamodb_local_events_tests"
    image: amazon/dynamodb-local:3.3.0
    ports:
      - "18000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb"]
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8000 || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  minio:
    container_name: "minio_local_events_tests"
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    ports:
      - "19000:9000"
      - "19001:9001"
    environment:
      MINIO_ROOT_USER: ${TEST_MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${TEST_MINIO_SECRET_KEY:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s
