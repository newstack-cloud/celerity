name: Celerity Dev Auth CI

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/dev-auth/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/dev-auth/**'
  workflow_dispatch:
    inputs: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      working-directory: ./apps/dev-auth

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Install Go Global Dependencies
      run: go install honnef.co/go/tools/cmd/staticcheck@latest && go get -u golang.org/x/sys/unix
      working-directory: ${{env.working-directory}}

    - name: Linting
      run: export PATH=$PATH:$(go env GOPATH)/bin && bash scripts/lint.sh
      working-directory: ${{env.working-directory}}
