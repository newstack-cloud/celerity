name: Python Runtime CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/runtime/python/**'
      - '!**/*.md'
  pull_request:
    paths:
      - 'apps/runtime/python/**'
      - '!**/*.md'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/runtime/python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Check formatting with ruff
        run: uv run ruff format --check .

      - name: Type check with mypy
        run: uv run mypy main.py sdk_compat_check.py generate_manifest.py

      - name: Verify SDK packages resolve
        run: uv run python -c "from celerity.bootstrap.runtime_orchestrator import start_runtime; print('celerity-sdk OK')"

  docker-build:
    name: Docker Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [runtime, dev]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: apps/runtime/python
          target: ${{ matrix.target }}
          push: false
          load: true
          tags: celerity-runtime-python-3-13:${{ matrix.target }}-test
          cache-from: type=gha,scope=ci-python-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=ci-python-${{ matrix.target }}
