name: Celerity Local Events Sidecar Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. apps/local-events/v0.3.0)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: newstack-cloud/celerity-local-events

jobs:
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG##*/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION from tag: $TAG"

  build:
    name: Build & Push Production Image
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ !contains(needs.prepare.outputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=Celerity Local Events Sidecar
            org.opencontainers.image.description=Celerity Local Events Sidecar for local development and testing of Celerity applications

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/local-events
          target: production
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=runtime-prod
          cache-to: type=gha,mode=max,scope=runtime-prod

  scan-images:
    name: Scan Container Images
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Trivy scan production image (table)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      - name: Trivy scan production image (SARIF)
        if: always()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}"
          format: "sarif"
          output: "trivy-runtime.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload production scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-runtime.sarif"
          category: "container-runtime"

  sign-and-attest:
    name: Sign & Attest Images
    runs-on: ubuntu-latest
    needs: [build, scan-images]
    if: always() && needs.build.result == 'success'
    env:
      # Store signatures and attestations as OCI 1.1 referrers instead of
      # tag-based artifacts (.sig/.att/.sbom tags) that pollute the GHCR UI.
      COSIGN_REGISTRY_REFERRERS_MODE: oci-1-1
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      # --- Production image ---
      - name: Sign production image (cosign keyless)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}

      - name: Generate production SBOM
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }} \
            -o spdx-json=runtime-sbom.spdx.json

      - name: Attest production SBOM
        run: |
          cosign attest --yes --predicate runtime-sbom.spdx.json --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ needs.build.outputs.digest }}

      - name: GitHub attestation (production)
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ needs.build.outputs.digest }}
          push-to-registry: true
